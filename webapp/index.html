<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flashbang Skins</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap');
  :root { --gold:#f5c842; --bg:#0d0d0d; --card:#151515; --text:#e8e8e8; --muted:#888; --green:#4ade80; --red:#f87171; --blue:#38bdf8; --panel-bg:#111827; --input-bg:#1f2937; --border:#374151; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { height:-webkit-fill-available; height:100%; }
  body { min-height:100vh; min-height:-webkit-fill-available; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; overflow-x:hidden; padding-bottom:env(safe-area-inset-bottom); }
  .header { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid #1a1a1a; padding:10px 14px 8px; padding-top:max(10px,env(safe-area-inset-top)); }
  .header-top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .header-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#f5c842,#e65c00); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .header-info { flex:1; }
  .header-title { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; background:linear-gradient(90deg,#f5c842,#ff8c00,#ff4e50); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:.5px; line-height:1; margin-bottom:2px; }
  .header-stats { display:flex; gap:12px; font-size:11px; color:var(--muted); }
  .stat-item { display:flex; align-items:center; gap:4px; }
  .stat-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
  .stat-dot.total { background:var(--gold); box-shadow:0 0 6px var(--gold); animation:none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .rainbow-line { height:2px; background:linear-gradient(90deg,#ff4e50,#f9d423,#4ade80,#38bdf8,#a78bfa,#f472b6); background-size:200% 100%; animation:rainbowSlide 3s linear infinite; }
  @keyframes rainbowSlide { 0%{background-position:0% 0} 100%{background-position:200% 0} }
  .feed { padding:8px 52px 90px 10px; display:flex; flex-direction:column-reverse; gap:10px; }
  .post { background:var(--card); border-radius:12px; border:1px solid #1e1e1e; overflow:hidden; position:relative; }
  .post::before { content:''; position:absolute; inset:0; border-radius:12px; padding:1px; background:linear-gradient(135deg,#f5c842,#ff4e50,#a78bfa,#38bdf8); -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; opacity:.5; pointer-events:none; }
  .post-header { display:flex; align-items:center; gap:8px; padding:8px 10px 6px; }
  .seller-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .seller-name { font-size:12px; font-weight:600; color:#38bdf8; flex:1; }
  .post-time { font-size:10px; color:var(--muted); }
  .post-images { display:grid; grid-template-columns:1fr 1fr; gap:2px; height:130px; position:relative; background:#0a0a0a; }
  .post-img { background:#111; display:flex; align-items:center; justify-content:center; font-size:38px; position:relative; overflow:hidden; }
  .post-img::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.5) 100%); }
  .sold-overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--red); color:#fff; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:16px; padding:4px 14px; border-radius:6px; z-index:5; letter-spacing:1px; }
