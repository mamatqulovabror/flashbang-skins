<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashbang Skins</title>
<style>
@keyframes shimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
@keyframes glow { 0%,100%{opacity:1} 50%{opacity:0.7} }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0d0d; color:#fff; font-family:-apple-system,sans-serif; max-width:480px; margin:0 auto; }
.header { background:linear-gradient(135deg,#1a1a1a,#252525); padding:10px 16px; position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:10px; border-bottom:2px solid transparent; border-image:linear-gradient(90deg,#FFD700,#FF8C00,#FF4500,#FF69B4,#9400D3,#0080FF,#00CED1,#FFD700) 1; box-shadow:0 4px 20px rgba(0,0,0,0.8); }
.header-avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#FFD700,#FFA500,#FF6347); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; box-shadow:0 0 15px #FFD700, 0 0 30px rgba(255,165,0,0.5); animation:glow 2s infinite; }
.header-title { font-size:17px; font-weight:800; background:linear-gradient(90deg,#FFD700,#FFA500,#FF6347,#FF69B4,#DA70D6,#FFD700); background-size:300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 4s linear infinite; }
.header-stats { font-size:11px; color:#999; margin-top:3px; display:flex; gap:10px; }
.header-stats span { display:flex; align-items:center; gap:3px; }
.online-dot { width:7px; height:7px; border-radius:50%; background:#00FF7F; display:inline-block; box-shadow:0 0 8px #00FF7F, 0 0 16px #00FF7F; animation:glow 1.5s infinite; }
.feed { padding:8px 48px 80px 12px; display:flex; flex-direction:column-reverse; }
.post { margin:6px 0; border-radius:16px; overflow:hidden; background:linear-gradient(145deg,#1a1a1a,#202020); position:relative; box-shadow:0 4px 20px rgba(0,0,0,0.6); }
.post::before { content:''; position:absolute; inset:0; border-radius:16px; padding:1.5px; background:linear-gradient(135deg,#FFD700,#FF8C00,#FF1493,#9400D3,#0080FF,#00CED1,#00FF7F,#FFD700); background-size:400%; -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; animation:shimmer 4s linear infinite; pointer-events:none; }
.post-header { padding:10px 12px 6px; display:flex; align-items:center; gap:8px; }
.seller-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#FF6347,#FFD700); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; box-shadow:0 0 10px rgba(255,165,0,0.5); }
.seller-name { font-size:13px; font-weight:700; background:linear-gradient(90deg,#FFA500,#FFD700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.post-time { font-size:10px; color:#555; margin-left:auto; }
.post-images { display:grid; grid-template-columns:1fr 1fr; gap:2px; background:#000; }
.post-img { width:100%; aspect-ratio:4/3; background:linear-gradient(135deg,#0f0f0f,#1a1a1a); display:flex; align-items:center; justify-content:center; font-size:56px; position:relative; overflow:hidden; }
.post-img span { filter:drop-shadow(0 0 16px rgba(255,215,0,0.6)); }
.sold-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center; }
.sold-badge { font-size:16px; font-weight:900; padding:6px 16px; border-radius:8px; letter-spacing:2px; background:rgba(80,80,80,0.9); border:1.5px solid #777; color:#bbb; }
.post-body { padding:10px 14px 6px; }
.post-title { font-size:14px; font-weight:800; color:#f0f0f0; line-height:1.4; }
.post-title .star { background:linear-gradient(90deg,#FFD700,#FFA500); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-right:2px; }
.post-price-row { display:flex; align-items:center; gap:8px; margin-top:5px; }
.post-price { font-size:17px; font-weight:900; background:linear-gradient(90deg,#00FF7F,#00CED1,#00BFFF,#00FF7F); background-size:300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 3s linear infinite; }
.post-price.sold-price { background:none !important; -webkit-text-fill-color:#555 !important; text-decoration:line-through; font-size:14px; animation:none; }
.sold-text { font-size:12px; color:#00CC66; font-weight:700; }
